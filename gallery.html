<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery & Songs | T.A</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #111;
        color: #fff;
        line-height: 1.6;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
        background: rgba(0, 0, 0, 0.9);
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .logo {
        height: 60px;
      }
      nav ul {
        list-style: none;
        display: flex;
        gap: 30px;
        margin: 0;
        padding: 0;
      }
      nav ul li a {
        color: #fff;
        text-decoration: none;
        font-size: 1em;
        transition: color 0.3s ease;
      }
      nav ul li a:hover {
        color: #e91e63;
      }
      .gallery {
        padding: 60px 20px;
        max-width: 1200px;
        margin: auto;
      }
      .gallery h1 {
        font-size: 2.5em;
        margin-bottom: 30px;
        text-align: center;
        color: #e91e63;
      }
      .photos {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 50px;
      }
      .photos img {
        width: 100%;
        border-radius: 10px;
      }
      .songs {
        margin-top: 40px;
      }
      .song {
        margin-bottom: 25px;
        padding: 15px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
      }
      .song h3 {
        margin: 0 0 10px;
        color: #e91e63;
      }
      .song audio {
        width: 100%;
        margin-bottom: 10px;
      }
      .song a {
        display: inline-block;
        padding: 8px 15px;
        background: #e91e63;
        color: #fff;
        text-decoration: none;
        border-radius: 5px;
        font-size: 0.9em;
      }
      .song a:hover {
        background: #c2185b;
      }
      footer {
        margin-top: 60px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.8);
        color: #999;
        text-align: center;
      }
      /* hide hamburger on desktop */
      .menu-toggle {
        display: none;
        font-size: 24px;
      }

      /* 📱 MOBILE */
      @media (max-width: 768px) {
        .menu-toggle {
          display: block;
        }

        nav ul {
          display: none;
          flex-direction: column;
          background: black;
          position: absolute;
          top: 60px;
          right: 0;
          width: 200px;
          padding: 10px;
        }

        nav ul.active {
          display: flex;
        }
      }
    </style>
  </head>
